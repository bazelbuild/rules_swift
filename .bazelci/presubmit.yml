---
x_defaults:
  # YAML has a feature for "repeated nodes", BazelCI is fine with extra nodes
  # it doesn't know about; so that is used to avoid repeating common subparts.
  mac_common: &mac_common
    platform: macos_arm64
    xcode_version: "26.2"
    build_targets:
      - "//examples/..."
    test_targets:
      - "//examples/..."
      - "//test/..."
  linux_environment: &linux_environment
    platform: ubuntu2204
    environment:
      SWIFT_VERSION: "6.0.3"
      SWIFT_HOME: "$HOME/swift-$SWIFT_VERSION"
      PATH: "$SWIFT_HOME/usr/bin:$PATH"
  linux_common: &linux_common
    <<: *linux_environment
    build_flags: &linux_flags
      # On Linux, we look for Swift toolchain binaries on the path. We may be
      # able to change this when we start auto-downloading toolchains (see
      # https://github.com/bazelbuild/rules_swift/issues/4).
      - "--action_env=PATH"
    build_targets:
      - "//examples/..."
      - "-//examples/apple/..."
    test_flags: *linux_flags
    test_targets:
      - "//examples/..."
      - "//test/..."
      - "-//examples/apple/..."
      # The following tests require Swift >5.8.
      - "-//test:const_values_empty_const_values_multiple_files"
      - "-//test:const_values_empty_const_values_single_file"
      - "-//test:const_values_expected_argv"
      - "-//test:const_values_wmo_single_values_file"
      - "-//test:output_file_map_default"
  windows_common: &windows_common
    platform: windows
    build_targets:
      - "//tools/..."
      # Cross-platform Swift examples that exercise the Windows host toolchain:
      # a `swift_binary` executable and a `linkshared` Windows DLL.
      - "//examples/xplatform/hello_world"
      - "//examples/xplatform/shared_library"
    test_targets:
      # Exercises XCTest discovery, the test runner, and `swift_test` execution
      # on Windows.
      - "//examples/xplatform/xctest"

tasks:
  macos_latest:
    name: "Current LTS"
    bazel: latest
    <<: *mac_common

  macos_rolling:
    name: "Latest rolling"
    bazel: rolling
    <<: *mac_common

  macos_last_green:
    name: "Last Green Bazel"
    bazel: last_green
    <<: *mac_common

  macos_latest_shell_scripts:
    name: "macOS shell tests"
    platform: macos_arm64
    xcode_version: "26.2"
    bazel: latest
    shell_commands:
      - "test/fixtures/layering_check/layering_check_failure_test.sh"

  ubuntu2204_latest:
    name: "Current LTS"
    bazel: latest
    shell_commands:
      - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
      - "mkdir $SWIFT_HOME"
      - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
    <<: *linux_common

  ubuntu2204_rolling:
    name: "Latest rolling"
    bazel: rolling
    shell_commands:
      - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
      - "mkdir $SWIFT_HOME"
      - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
    <<: *linux_common

  ubuntu2204_last_green:
    name: "Last Green Bazel"
    bazel: last_green
    shell_commands:
      - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
      - "mkdir $SWIFT_HOME"
      - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
    <<: *linux_common

  windows:
    name: "Current LTS"
    bazel: latest
    # Expose the installed Swift toolchain and the MSVC/Windows SDK environment to
    # the build. The swift.org installer (`batch_commands` below) records its
    # Toolchains/Runtimes bin on the user's Path and sets SDKROOT, and a Visual
    # Studio "developer prompt" (vcvars) would set INCLUDE/LIB for swiftc's clang
    # to find the C headers (errno.h, ...) and for the linker — but none of that
    # reaches the already-running CI process. Set it all here. BazelCI expands
    # these with os.path.expandvars, so %VAR% resolves and earlier keys (listed
    # first) are available to later ones. The VS/SDK versions are pinned to the
    # Bazel CI Windows image; update them if `vcvars64.bat`'s output changes.
    environment:
      SWIFT_VERSION: "6.3.2"
      VCToolsInstallDir: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Tools\\MSVC\\14.39.33519"
      WindowsSdkDir: "C:\\Program Files (x86)\\Windows Kits\\10"
      WindowsSDKVersion: "10.0.26100.0"
      Path: "%LOCALAPPDATA%\\Programs\\Swift\\Toolchains\\%SWIFT_VERSION%+Asserts\\usr\\bin;%LOCALAPPDATA%\\Programs\\Swift\\Runtimes\\%SWIFT_VERSION%\\usr\\bin;%LOCALAPPDATA%\\Programs\\Swift\\Tools\\%SWIFT_VERSION%;%VCToolsInstallDir%\\bin\\Hostx64\\x64;%WindowsSdkDir%\\bin\\%WindowsSDKVersion%\\x64;%PATH%"
      SDKROOT: "%LOCALAPPDATA%\\Programs\\Swift\\Platforms\\%SWIFT_VERSION%\\Windows.platform\\Developer\\SDKs\\Windows.sdk"
      INCLUDE: "%VCToolsInstallDir%\\include;%WindowsSdkDir%\\include\\%WindowsSDKVersion%\\ucrt;%WindowsSdkDir%\\include\\%WindowsSDKVersion%\\shared;%WindowsSdkDir%\\include\\%WindowsSDKVersion%\\um;%WindowsSdkDir%\\include\\%WindowsSDKVersion%\\winrt;%WindowsSdkDir%\\include\\%WindowsSDKVersion%\\cppwinrt"
      LIB: "%VCToolsInstallDir%\\lib\\x64;%WindowsSdkDir%\\lib\\%WindowsSDKVersion%\\ucrt\\x64;%WindowsSdkDir%\\lib\\%WindowsSDKVersion%\\um\\x64"
    batch_commands:
      - "curl -sSL -o %TEMP%\\swift-installer.exe https://download.swift.org/swift-%SWIFT_VERSION%-release/windows10/swift-%SWIFT_VERSION%-RELEASE/swift-%SWIFT_VERSION%-RELEASE-windows10.exe"
      - "%TEMP%\\swift-installer.exe -q"
    <<: *windows_common

  doc_tests:
    name: "Doc tests"
    bazel: latest
    <<: *linux_environment
    shell_commands:
      - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
      - "mkdir $SWIFT_HOME"
      - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
    test_targets:
      - "doc/..."

  gazelle_check:
    name: "Gazelle up-to-date"
    platform: ubuntu2204
    bazel: latest
    shell_commands:
      - "bazel run //doc:gazelle"
      - "git diff --exit-code || { echo '::error::Gazelle-generated BUILD files are out of date. Run: bazel run //doc:gazelle'; exit 1; }"

buildifier: 8.5.1
