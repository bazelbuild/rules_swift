---
x_defaults:
  # YAML has a feature for "repeated nodes", BazelCI is fine with extra nodes
  # it doesn't know about; so that is used to avoid repeating common subparts.
  mac_common: &mac_common
    platform: macos_arm64
    xcode_version: "26.2"
    build_targets:
      - "//examples/..."
    test_targets:
      - "//examples/..."
      - "//test/..."
  linux_environment: &linux_environment
    platform: ubuntu2204
    environment:
      SWIFT_VERSION: "6.0.3"
      SWIFT_HOME: "$HOME/swift-$SWIFT_VERSION"
      PATH: "$SWIFT_HOME/usr/bin:$PATH"
  linux_common: &linux_common
    <<: *linux_environment
    build_flags: &linux_flags
      # On Linux, we look for Swift toolchain binaries on the path. We may be
      # able to change this when we start auto-downloading toolchains (see
      # https://github.com/bazelbuild/rules_swift/issues/4).
      - "--action_env=PATH"
    build_targets:
      - "//examples/..."
      - "-//examples/apple/..."
    test_flags: *linux_flags
    test_targets:
      - "//examples/..."
      - "//test/..."
      - "-//examples/apple/..."
      # The following tests require Swift >5.8.
      - "-//test:const_values_empty_const_values_multiple_files"
      - "-//test:const_values_empty_const_values_single_file"
      - "-//test:const_values_expected_argv"
      - "-//test:const_values_wmo_single_values_file"
      - "-//test:output_file_map_default"
  windows_common: &windows_common
    platform: windows
    build_targets:
      - "//tools/..."
      # Cross-platform Swift examples that exercise the Windows host toolchain:
      # a `swift_binary` executable and a `linkshared` Windows DLL.
      - "//examples/xplatform/hello_world"
      - "//examples/xplatform/shared_library"
    test_targets:
      # Exercises XCTest discovery, the test runner, and `swift_test` execution
      # on Windows.
      - "//examples/xplatform/xctest"

tasks:
  macos_latest:
    name: "Current LTS"
    bazel: latest
    <<: *mac_common

  macos_rolling:
    name: "Latest rolling"
    bazel: rolling
    <<: *mac_common

  macos_last_green:
    name: "Last Green Bazel"
    bazel: last_green
    <<: *mac_common

  macos_cross_compilation:
    name: "Cross-compilation (wasm + Android)"
    platform: macos_arm64
    xcode_version: "26.2"
    bazel: latest
    # The //examples/cross_compilation targets are tagged `manual` (they fetch
    # the Swift SDK bundles and, for Android, the NDK), so they are excluded
    # from the `//examples/...` wildcard the other tasks build. List them
    # explicitly here so the Swift-SDK cross-compilation toolchains are exercised
    # in CI. Build-only: the trivial reactor exercises the link path, while
    # runtime behavior is covered downstream by real consumers.
    build_targets:
      - "//examples/cross_compilation:Reactor.wasm"
      - "//examples/cross_compilation:web_app"
      - "//examples/cross_compilation:libSwiftJNI.so"

  macos_latest_shell_scripts:
    name: "macOS shell tests"
    platform: macos_arm64
    xcode_version: "26.2"
    bazel: latest
    shell_commands:
      - "test/fixtures/layering_check/layering_check_failure_test.sh"

  ubuntu2204_latest:
    name: "Current LTS"
    bazel: latest
    shell_commands:
      - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
      - "mkdir $SWIFT_HOME"
      - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
    <<: *linux_common

  ubuntu2204_rolling:
    name: "Latest rolling"
    bazel: rolling
    shell_commands:
      - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
      - "mkdir $SWIFT_HOME"
      - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
    <<: *linux_common

  ubuntu2204_last_green:
    name: "Last Green Bazel"
    bazel: last_green
    shell_commands:
      - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
      - "mkdir $SWIFT_HOME"
      - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
    <<: *linux_common

  windows:
    name: "Current LTS"
    bazel: latest
    # The swift.org installer (`batch_commands` below) installs per-user and adds
    # its Toolchains/Runtimes bin to the user's `Path` and sets `SDKROOT`, but
    # those user/machine env changes don't reach the already-running CI process.
    # Set them explicitly so the bazel build — and the Swift autoconfiguration's
    # `swiftc.exe` lookup — finds the toolchain. BazelCI expands these with
    # `os.path.expandvars`, so `%LOCALAPPDATA%` / `%SWIFT_VERSION%` / `%PATH%`
    # resolve (SWIFT_VERSION is listed first so it is set before the others
    # expand). Visual Studio (MSVC) is already on the image and is used to link.
    environment:
      SWIFT_VERSION: "6.0.3"
      Path: "%LOCALAPPDATA%\\Programs\\Swift\\Toolchains\\%SWIFT_VERSION%+Asserts\\usr\\bin;%LOCALAPPDATA%\\Programs\\Swift\\Runtimes\\%SWIFT_VERSION%\\usr\\bin;%LOCALAPPDATA%\\Programs\\Swift\\Tools\\%SWIFT_VERSION%;%PATH%"
      SDKROOT: "%LOCALAPPDATA%\\Programs\\Swift\\Platforms\\%SWIFT_VERSION%\\Windows.platform\\Developer\\SDKs\\Windows.sdk"
    batch_commands:
      - "curl -sSL -o %TEMP%\\swift-installer.exe https://download.swift.org/swift-%SWIFT_VERSION%-release/windows10/swift-%SWIFT_VERSION%-RELEASE/swift-%SWIFT_VERSION%-RELEASE-windows10.exe"
      - "%TEMP%\\swift-installer.exe -q"
      - "echo ==DIAG VCENV== & call \"%BAZEL_VC%\\Auxiliary\\Build\\vcvars64.bat\" >nul & set | findstr /B /I \"INCLUDE= LIB= LIBPATH= UCRTVersion= VCToolsInstallDir= WindowsSdkDir= WindowsSDKVersion=\" & echo ==DIAG END=="
    <<: *windows_common

  doc_tests:
    name: "Doc tests"
    bazel: latest
    <<: *linux_environment
    shell_commands:
      - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
      - "mkdir $SWIFT_HOME"
      - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
    test_targets:
      - "doc/..."

  gazelle_check:
    name: "Gazelle up-to-date"
    platform: ubuntu2204
    bazel: latest
    shell_commands:
      - "bazel run //doc:gazelle"
      - "git diff --exit-code || { echo '::error::Gazelle-generated BUILD files are out of date. Run: bazel run //doc:gazelle'; exit 1; }"

buildifier: 8.5.1
