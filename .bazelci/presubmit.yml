---
x_defaults:
  # YAML has a feature for "repeated nodes", BazelCI is fine with extra nodes
  # it doesn't know about; so that is used to avoid repeating common subparts.
  mac_common: &mac_common
    platform: macos_arm64
    xcode_version: "26.2"
    build_targets:
      - "//examples/..."
    test_targets:
      - "//examples/..."
      - "//test/..."
  linux_environment: &linux_environment
    platform: ubuntu2204
    environment:
      SWIFT_VERSION: "6.0.3"
      SWIFT_HOME: "$HOME/swift-$SWIFT_VERSION"
      PATH: "$SWIFT_HOME/usr/bin:$PATH"
  linux_swiftly_environment: &linux_swiftly_environment
    platform: ubuntu2204
    environment:
      SWIFT_VERSION: "6.0.3"
      PATH: "$HOME/.local/share/swiftly/bin:$PATH"
  linux_swift_tar_install: &linux_swift_tar_install
    - "echo --- Downloading and extracting Swift $SWIFT_VERSION to $SWIFT_HOME"
    - "mkdir $SWIFT_HOME"
    - "curl https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2204/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu22.04.tar.gz | tar xvz --strip-components=1 -C $SWIFT_HOME"
  linux_swiftly_install: &linux_swiftly_install
    - "echo --- Installing swiftly and Swift $SWIFT_VERSION"
    - "curl -L -o /tmp/swiftly.tar.gz https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz"
    - "tar zxf /tmp/swiftly.tar.gz -C /tmp"
    - "/tmp/swiftly init --assume-yes --no-modify-profile --quiet-shell-followup"
    # `--post-install-file` redirects swiftly's "install these system packages"
    # hint to a file instead of exiting non-zero. We only need swiftc here, not
    # libcurl/lldb/etc. that the hint asks for.
    - "swiftly install --use --post-install-file /tmp/swiftly-post-install.sh $SWIFT_VERSION"
  linux_common: &linux_common
    <<: *linux_environment
    build_flags: &linux_flags
      # On Linux, we look for Swift toolchain binaries on the path. We may be
      # able to change this when we start auto-downloading toolchains (see
      # https://github.com/bazelbuild/rules_swift/issues/4).
      - "--action_env=PATH"
    build_targets:
      - "//examples/..."
      - "-//examples/apple/..."
    test_flags: *linux_flags
    test_targets:
      - "//examples/..."
      - "//test/..."
      - "-//examples/apple/..."
      # The following tests require Swift >5.8.
      - "-//test:const_values_empty_const_values_multiple_files"
      - "-//test:const_values_empty_const_values_single_file"
      - "-//test:const_values_expected_argv"
      - "-//test:const_values_wmo_single_values_file"
      - "-//test:output_file_map_default"
  linux_swiftly_common: &linux_swiftly_common
    <<: *linux_common
    environment:
      SWIFT_VERSION: "6.0.3"
      PATH: "$HOME/.local/share/swiftly/bin:$PATH"
  windows_common: &windows_common
    platform: windows
    build_flags:
      # Override 'sandboxed' strategy set in .bazelrc because it's not
      # available on Windows
      - "--strategy=SwiftCompile="
    build_targets:
      - "//tools/..."

tasks:
  macos_latest:
    name: "Current LTS"
    bazel: latest
    <<: *mac_common

  macos_rolling:
    name: "Latest rolling"
    bazel: rolling
    <<: *mac_common

  macos_last_green:
    name: "Last Green Bazel"
    bazel: last_green
    <<: *mac_common

  # Keep one job exercising the legacy tar-extract install path so we notice
  # if it regresses; the other Linux jobs use swiftly.
  ubuntu2204_latest:
    name: "Current LTS"
    bazel: latest
    shell_commands: *linux_swift_tar_install
    <<: *linux_common

  ubuntu2204_rolling:
    name: "Latest rolling"
    bazel: rolling
    shell_commands: *linux_swiftly_install
    <<: *linux_swiftly_common

  ubuntu2204_last_green:
    name: "Last Green Bazel"
    bazel: last_green
    shell_commands: *linux_swiftly_install
    <<: *linux_swiftly_common

  # TODO: re-enable when Windows in Bazel CI is properly configured for Swift.
  # windows_last_green:
  #   name: "Last Green Bazel"
  #   bazel: last_green
  #   <<: *windows_common

  doc_tests:
    name: "Doc tests"
    bazel: latest
    <<: *linux_swiftly_environment
    shell_commands: *linux_swiftly_install
    test_targets:
      - "doc/..."

  gazelle_check:
    name: "Gazelle up-to-date"
    platform: ubuntu2204
    bazel: latest
    shell_commands:
      - "bazel run //doc:gazelle"
      - "git diff --exit-code || { echo '::error::Gazelle-generated BUILD files are out of date. Run: bazel run //doc:gazelle'; exit 1; }"

buildifier: 8.5.1
