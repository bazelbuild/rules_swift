---
x_defaults:
  # YAML has a feature for "repeated nodes", BazelCI is fine with extra nodes
  # it doesn't know about; so that is used to avoid repeating common subparts.
  mac_common: &mac_common
    platform: macos_arm64
    xcode_version: "26.2"
    build_targets:
      - "//examples/..."
    test_targets:
      - "//examples/..."
      - "//test/..."
  linux_common: &linux_common
    platform: ubuntu2204
    build_targets:
      - "//examples/..."
      - "-//examples/apple/..."
    test_targets:
      - "//examples/..."
      - "//test/..."
      - "-//examples/apple/..."
      # The following tests require Swift >5.8.
      - "-//test:const_values_empty_const_values_multiple_files"
      - "-//test:const_values_empty_const_values_single_file"
      - "-//test:const_values_expected_argv"
      - "-//test:const_values_wmo_single_values_file"
      - "-//test:output_file_map_default"
  windows_common: &windows_common
    platform: windows
    build_flags:
      # Override 'sandboxed' strategy set in .bazelrc because it's not
      # available on Windows
      - "--strategy=SwiftCompile="
    build_targets:
      - "//tools/..."

tasks:
  macos_latest:
    name: "Current LTS"
    bazel: latest
    <<: *mac_common

  macos_rolling:
    name: "Latest rolling"
    bazel: rolling
    <<: *mac_common

  macos_last_green:
    name: "Last Green Bazel"
    bazel: last_green
    <<: *mac_common

  macos_latest_shell_scripts:
    name: "macOS shell tests"
    platform: macos_arm64
    xcode_version: "26.2"
    bazel: latest
    shell_commands:
      - "test/fixtures/layering_check/layering_check_failure_test.sh"

  ubuntu2204_latest:
    name: "Current LTS"
    bazel: latest
    <<: *linux_common

  ubuntu2204_rolling:
    name: "Latest rolling"
    bazel: rolling
    <<: *linux_common

  ubuntu2204_last_green:
    name: "Last Green Bazel"
    bazel: last_green
    <<: *linux_common

  # TODO: re-enable when Windows in Bazel CI is properly configured for Swift.
  # windows_last_green:
  #   name: "Last Green Bazel"
  #   bazel: last_green
  #   <<: *windows_common

  doc_tests:
    name: "Doc tests"
    bazel: latest
    platform: ubuntu2204
    test_targets:
      - "doc/..."

  gazelle_check:
    name: "Gazelle up-to-date"
    platform: ubuntu2204
    bazel: latest
    shell_commands:
      - "bazel run //doc:gazelle"
      - "git diff --exit-code || { echo '::error::Gazelle-generated BUILD files are out of date. Run: bazel run //doc:gazelle'; exit 1; }"

buildifier: 8.5.1
